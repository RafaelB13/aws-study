<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S3 Uploader - Serverless LocalStack</title>
  </head>
  <body
    class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center font-sans antialiased w-full"
  >
    <div id="app" class="w-full max-w-2xl px-4">
      <div class="mb-10 text-center">
        <h1
          class="text-4xl font-extrabold tracking-tight mb-3 bg-linear-to-r from-blue-400 to-emerald-400 text-transparent bg-clip-text"
        >
          S3 Gateway Uploader
        </h1>
        <p class="text-slate-400 text-lg">
          Envie arquivos simulando AWS Lambda & S3 no
          <span
            class="text-emerald-400 font-semibold border-b border-emerald-400/30"
            >LocalStack</span
          >
        </p>
      </div>

      <div
        class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-2xl p-8 shadow-2xl"
      >
        <form id="uploadForm" class="flex flex-col gap-6">
          <div class="flex flex-col gap-2">
            <label for="apiUrl" class="text-sm font-medium text-slate-300"
              >URL do API Gateway (LocalStack)</label
            >
            <input
              type="text"
              id="apiUrl"
              required
              class="bg-slate-900/50 border border-slate-700 text-slate-100 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-3 font-mono"
              placeholder="http://localhost:4566/restapis/XXXXXXXX/dev/_user_request_/hello"
            />
          </div>

          <div class="flex flex-col gap-2">
            <label for="filename" class="text-sm font-medium text-slate-300"
              >Nome do Arquivo (Ex: documento.txt)</label
            >
            <input
              type="text"
              id="filename"
              required
              class="bg-slate-900/50 border border-slate-700 text-slate-100 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-3 transition-colors"
              placeholder="meu-arquivo-teste.txt"
            />
          </div>

          <div class="flex flex-col gap-2">
            <label for="content" class="text-sm font-medium text-slate-300"
              >Conteúdo do Arquivo</label
            >
            <textarea
              id="content"
              rows="4"
              required
              class="bg-slate-900/50 border border-slate-700 text-slate-100 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-3 transition-colors resize-y"
              placeholder="Escreva algum conteúdo aqui para a Lambda gravar dentro do bucket..."
            ></textarea>
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="text-white bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 focus:ring-4 focus:outline-none focus:ring-blue-800 font-medium rounded-lg text-sm w-full sm:w-auto px-6 py-3 text-center transition-all shadow-lg flex items-center justify-center gap-2 group mt-2"
          >
            <span id="btnText">Fazer Upload pra Nuvem Falsa</span>
            <svg
              id="btnIcon"
              class="w-4 h-4 group-hover:translate-x-1 transition-transform"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 14 10"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M1 5h12m0 0L9 1m4 4L9 9"
              />
            </svg>
          </button>
        </form>

        <!-- Área onde o JSON do retorno vai aparecer -->
        <div
          id="resultContainer"
          class="mt-8 hidden opacity-0 transition-opacity duration-500"
        >
          <div class="flex items-center gap-2 mb-3">
            <span id="statusIndicator" class="flex w-3 h-3 rounded-full"></span>
            <h3 class="text-sm font-semibold text-slate-300">
              Retorno da AWS Lambda:
            </h3>
          </div>
          <div
            class="relative group rounded-xl overflow-hidden shadow-inner font-mono text-sm leading-relaxed"
            style="background-color: #1e293b; color: #a5b4fc"
          >
            <div
              class="flex bg-slate-700 px-4 py-2 border-b border-slate-600 items-center justify-between"
            >
              <div class="flex w-full gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
              </div>
              <span
                class="text-xs text-slate-400 font-sans tracking-wider"
                id="httpStatusBadge"
                >201 OK</span
              >
            </div>
            <pre
              id="jsonViewer"
              class="p-4 overflow-x-auto whitespace-pre-wrap word-break h-auto max-h-[300px]"
            ></pre>
          </div>
        </div>
      </div>

      <p class="text-center text-xs text-slate-500 mt-8 mb-4">
        Powered by Vite & Tailwind CSS. Conectado ao LocalStack.
      </p>
    </div>
    <script type="module" src="/ui/main.ts"></script>
  </body>
</html>
